<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biostat AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-top">
        <button type="button" class="new-chat-btn" id="btn-new-chat" title="New chat">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
          New Chat
        </button>
      </div>
      <div class="sidebar-content" id="sidebar-recent"></div>
      <div class="sidebar-bottom">
        <div class="model-badge">
          <div class="model-dot" aria-hidden="true"></div>
          llama3.2:latest
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button type="button" class="icon-btn" id="btn-toggle-sidebar" title="Toggle sidebar" aria-label="Toggle sidebar">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M2 4.5h14M2 9h14M2 13.5h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
          </button>
          <span class="topbar-title">Biostat AI</span>
        </div>
        <div class="topbar-actions">
          <button type="button" class="icon-btn" id="btn-clear-chat" title="Clear chat" aria-label="Clear chat">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M3 4.5h12M7.5 4.5V3h3v1.5M6 4.5l.75 9h4.5L12 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
      </header>

      <div class="chat-area" id="chat-area">
        <div class="welcome" id="welcome-view">
          <div class="welcome-icon" aria-hidden="true">
            <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
              <rect width="56" height="56" rx="16" fill="url(#wg)" />
              <defs>
                <linearGradient id="wg" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#10b981" />
                  <stop offset="1" stop-color="#059669" />
                </linearGradient>
              </defs>
              <path d="M18 28h20M28 18v20" stroke="#fff" stroke-width="3" stroke-linecap="round" />
            </svg>
          </div>
          <h1 class="welcome-title">Biostat AI</h1>
          <div class="example-grid">
            <div class="example-card"><span>What is biostatistics?</span>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 8h10M9 4l4 4-4 4" stroke="#10b981" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" /></svg>
            </div>
            <div class="example-card"><span>Explain p-value in simple terms</span>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 8h10M9 4l4 4-4 4" stroke="#10b981" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" /></svg>
            </div>
            <div class="example-card"><span>What is a confidence interval?</span>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 8h10M9 4l4 4-4 4" stroke="#10b981" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" /></svg>
            </div>
            <div class="example-card"><span>Describe hypothesis testing steps</span>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 8h10M9 4l4 4-4 4" stroke="#10b981" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" /></svg>
            </div>
          </div>
        </div>
        <div class="messages" id="messages-view" hidden></div>
        <div id="chat-bottom-anchor" aria-hidden="true"></div>
      </div>

      <div class="input-wrapper">
        <div class="input-box">
          <textarea
            id="chat-input"
            class="chat-input"
            placeholder="Ask a biostatistics question…"
            rows="1"
            maxlength="16000"
            aria-label="Your question"
          ></textarea>
          <button type="button" class="send-btn" id="btn-send" title="Send" aria-label="Send message" disabled>
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M3 10l14-7-7 14V10H3z" fill="currentColor" />
            </svg>
          </button>
        </div>
        <p class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</p>
      </div>
    </main>
  </div>
  <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
</body>
</html>
